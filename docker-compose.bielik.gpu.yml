# DOKUS Doc AI — nakladka GPU dla uslugi `ollama` (Ollama + Bielik).
# Dziedziczy warstwe Bielika (a przez nia baze) przez `include`, wiec podnosi caly stack z GPU
# JEDNYM plikiem — wylacznie na hoscie z GPU NVIDIA i zainstalowanym nvidia-container-toolkit
# (maszyna on-prem z GPU):
#   docker compose -f docker-compose.bielik.gpu.yml up -d
#
# UWAGA: na maszynie BEZ runtime nvidia ta rezerwacja TWARDO wywala start kontenera
# ("could not select device driver nvidia ...") — dlatego jest osobna warstwa, nieaktywna
# domyslnie, a nie wpis w bazie/warstwie CPU. Ollama sama spada na CPU, ale tylko gdy kontener
# w ogole wstanie; tu blokuje brama urzadzen Dockera, zanim to nastapi.

# Dziedziczenie warstwy Bielika (baza + usluga `ollama`) — deklaratywnie w YAML.
include:
  - docker-compose.bielik.yml

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            # `count: all` = wszystkie widoczne GPU; mozna zawezic (np. `count: 1`).
            - driver: nvidia
              count: all
              capabilities: [gpu]
