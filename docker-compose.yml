# DOKUS Doc AI.
# Krok 1: warstwa ekstrakcji/OCR (Tika). Krok 2: usluga FastAPI (API + logika).
# LLM jako osobna usluga dochodzi w fazie 4-5.
services:
  tika:
    build:
      context: ./tika
    image: dokus-doc-ai/tika:3.3.0.0-pol
    container_name: dokus-tika
    restart: unless-stopped
    ports:
      - "${TIKA_PORT:-9998}:9998"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  fastapi:
    build:
      context: ./api
    image: dokus-doc-ai/fastapi:0.1.0
    container_name: dokus-fastapi
    restart: unless-stopped
    depends_on:
      tika:
        condition: service_healthy
    # Wszystkie pokretla Settings przekazujemy JAWNIE — compose nie wstrzykuje .env do
    # kontenera automatycznie (.env sluzy tylko interpolacji ${...}). Brak => default z
    # api/app/config.py. Grupy jak w config.py / .env.example.
    environment:
      # --- Ekstrakcja ---
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-20971520}"
      MAX_OCR_PAGES: "${MAX_OCR_PAGES:-30}"
      # --- Tika ---
      TIKA_URL: "http://tika:9998"
      TIKA_TIMEOUT_SECONDS: "${TIKA_TIMEOUT_SECONDS:-120}"
      HEALTH_CHECK_TIMEOUT_SECONDS: "${HEALTH_CHECK_TIMEOUT_SECONDS:-3}"
      # --- Dostawca LLM (domyslnie 'fake' — nic nie wychodzi na zewnatrz) ---
      LLM_PROVIDER: "${LLM_PROVIDER:-fake}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_API_VERSION: "${LLM_API_VERSION:-}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      # --- Summaryzacja ---
      LLM_MAX_INPUT_CHARS: "${LLM_MAX_INPUT_CHARS:-90000}"
    # Adres nasluchu na HOSCIE. Domyslnie 0.0.0.0 (dev: dostepne z sieci). Na produkcji
    # zawezamy przez BIND_ADDR w .env — do interfejsu LAN, przez ktory laczy sie DOKUS,
    # albo do 127.0.0.1, gdy DOKUS stoi na tej samej maszynie.
    # Uwaga: `ports` w warstwach compose SIE SKLEJAJA (nie nadpisuja), wiec adresu NIE da sie
    # zmienic z docker-compose.prod.yml — musi byc sterowany stad, zmienna. Uslugi, ktorych
    # port ma na produkcji zniknac calkiem (tika), warstwa prod kasuje przez `ports: !reset []`.
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${FASTAPI_PORT:-8000}:8000"
    healthcheck:
      # python jest w obrazie (slim) — unikamy doinstalowywania curl.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
